# Netlify deployment config
# Drop this folder on netlify.com or connect the GitHub repo

[build]
  publish = "."
  command = "echo 'Static — no build needed'"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
